<!DOCTYPE html>
<html>
<head>
<title>Birthday Puzzle</title>
<style>
body{
font-family: Arial;
text-align:center;
background:black;
color:white;
margin-top:100px;
}
input{
padding:10px;
font-size:18px;
}
button{
padding:10px 20px;
font-size:18px;
}
</style>
</head>

<body>

<h1>Solve the Puzzle 🎁</h1>
<p>What was the first word you said to me? </p>

<input id="answer" placeholder="Enter answer">
<button onclick="check()">Submit</button>

<p id="result"></p>

<script>

function check(){

let ans=document.getElementById("answer").value;

if(ans=="mindblowing"){
document.body.innerHTML=
"<h1>🎉 Happy Birthday My Friend 🎉</h1><p>You unlocked the secret page!</p>";
}
else{
document.getElementById("result").innerHTML="Wrong answer 😜 Try again";
}

}

</script>

</body>
</html>
